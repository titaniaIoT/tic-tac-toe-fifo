<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe FIFO Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Pop-up Nhập Tên -->
    <div id="login-overlay" class="overlay">
        <div class="modal">
            <h2>Chào mừng!</h2>
            <p>Nhập tên của bạn để bắt đầu:</p>
            <input type="text" id="username-input" placeholder="Tên của bạn..." maxlength="15">
            <button onclick="login()">Bắt đầu</button>
        </div>
    </div>

    <div class="game-container">
        <h1>Tic Tac Toe FIFO</h1>
        
        <!-- Khu vực Sảnh (Lobby) -->
        <div id="lobby-ui" style="display: none;">
            <div class="lobby-header">
                <span id="welcome-text">Xin chào, ...</span>
                <button onclick="createRoom()" class="btn-create">+ Tạo phòng mới</button>
            </div>

            <div class="lobby-search">
                <input type="number" id="search-room-input" placeholder="Nhập mã phòng (VD: 1234)">
                <button onclick="searchRoom()" class="btn-search">Tìm phòng</button>
            </div>

            <h3>Danh sách phòng đang chờ</h3>
            <div id="room-list" class="room-list">
                <!-- Danh sách phòng sẽ hiện ở đây -->
                <p>Đang tải danh sách phòng...</p>
            </div>
        </div>

        <!-- Khu vực Game -->
        <div id="game-ui" style="display: none;">
            <div class="game-header">
                <button onclick="backToLobby()" class="btn-back">← Thoát</button>
                <span id="room-display">Phòng: ...</span>
            </div>
            
            <div class="player-info">
                <div id="info-x" class="player-box">
                    <span class="mark">X</span>
                    <span id="name-x">Đang chờ...</span>
                    <div id="ready-x" class="ready-status">Chưa sẵn sàng</div>
                </div>
                <div class="vs">VS</div>
                <div id="info-o" class="player-box">
                    <span class="mark">O</span>
                    <span id="name-o">Đang chờ...</span>
                    <div id="ready-o" class="ready-status">Chưa sẵn sàng</div>
                </div>
            </div>

            <div class="status">
                <p id="turn-status">Đang chờ đối thủ...</p>
                <p id="timer-display" style="display: none;">15s</p>
            </div>

            <div class="board">
                <!-- 9 ô cờ -->
                <div class="row"><div class="cell" onclick="handleMove(0)"></div><div class="cell" onclick="handleMove(1)"></div><div class="cell" onclick="handleMove(2)"></div></div>
                <div class="row"><div class="cell" onclick="handleMove(3)"></div><div class="cell" onclick="handleMove(4)"></div><div class="cell" onclick="handleMove(5)"></div></div>
                <div class="row"><div class="cell" onclick="handleMove(6)"></div><div class="cell" onclick="handleMove(7)"></div><div class="cell" onclick="handleMove(8)"></div></div>
            </div>

            <div class="controls">
                <button id="ready-btn" onclick="toggleReady()">Sẵn sàng</button>
            </div>

            <!-- Chat Room -->
            <div class="chat-container">
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="chat-input-field" placeholder="Nhập tin nhắn..." maxlength="50">
                    <button onclick="sendMessage()" class="btn-send">Gửi</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="game.js"></script>
</body>
</html>
